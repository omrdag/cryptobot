<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CryptoBot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080c14;
  --s1:#0d1421;
  --s2:#111927;
  --s3:#162032;
  --border:#1c2a3f;
  --border2:#243347;
  --accent:#00e5b0;
  --accent2:#00b8d4;
  --gold:#f59e0b;
  --danger:#f43f5e;
  --purple:#8b5cf6;
  --text:#e8f0fe;
  --dim:#4a6080;
  --dim2:#2d4060;
}
html{background:var(--bg);scroll-behavior:smooth}
body{font-family:'Space Grotesk',sans-serif;color:var(--text);min-height:100vh;padding-bottom:40px}

/* ── Top bar ── */
.topbar{background:var(--s1);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#00e5b015,#00b8d415);border:1px solid #00e5b030;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:16px;height:16px;stroke:var(--accent);fill:none;stroke-width:2.2}
.brand{font-size:15px;font-weight:600;letter-spacing:-.3px}
.brand span{color:var(--accent)}
.conn-pill{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--s2);color:var(--dim)}
.conn-pill.live{border-color:#00e5b030;background:#00e5b008;color:var(--accent)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--dim)}
.live-dot.on{background:var(--accent);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 0 0 #00e5b050}50%{opacity:.6;box-shadow:0 0 0 4px #00e5b000}}
.topbar-right{display:flex;align-items:center;gap:8px}
.mode-tag{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;border-radius:4px;background:var(--gold)18;color:var(--gold);border:1px solid var(--gold)30;font-weight:500}
.clock{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);min-width:50px;text-align:right}

/* ── Container ── */
.wrap{max-width:480px;margin:0 auto;padding:16px}

/* ── Status bar ── */
.statusbar{font-size:11px;font-family:'JetBrains Mono',monospace;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--s1);color:var(--dim);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.statusbar.ok{border-color:#00e5b025;color:var(--accent)}
.statusbar.err{border-color:#f43f5e25;color:var(--danger)}

/* ── Bot controls ── */
.controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.btn{padding:10px;border-radius:10px;border:1px solid;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;background:transparent}
.btn-start{border-color:#00e5b030;color:var(--accent)}.btn-start:active{background:#00e5b015}
.btn-stop{border-color:#f43f5e30;color:var(--danger)}.btn-stop:active{background:#f43f5e15}

/* ── Stat cards ── */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:12px 14px;position:relative;overflow:hidden}
.stat.accent{border-color:#00e5b022;background:linear-gradient(135deg,#00e5b008,#00b8d405)}
.stat.danger{border-color:#f43f5e22;background:#f43f5e06}
.stat-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:500}
.stat-value{font-size:20px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:-.5px}
.stat-value.g{color:var(--accent)}
.stat-value.r{color:var(--danger)}
.stat-sub{font-size:10px;color:var(--dim);margin-top:4px}
.stat-glow{position:absolute;top:-20px;right:-20px;width:60px;height:60px;border-radius:50%;filter:blur(20px);opacity:.15}
.stat.accent .stat-glow{background:var(--accent)}

/* ── Section title ── */
.sec{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sec-line{flex:1;height:1px;background:var(--border)}

/* ── Position card ── */
.pos{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;transition:border-color .3s}
.pos.long-pos{border-left:3px solid var(--accent)}
.pos.short-pos{border-left:3px solid var(--danger)}
.pos-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.pos-sym{font-size:14px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:-.3px}
.pos-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.tag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:.03em}
.tag.long{background:#00e5b015;color:var(--accent);border:1px solid #00e5b025}
.tag.short{background:#f43f5e15;color:var(--danger);border:1px solid #f43f5e25}
.tag.large{background:#f59e0b15;color:var(--gold);border:1px solid #f59e0b25}
.tag.sync{background:#8b5cf615;color:var(--purple);border:1px solid #8b5cf625}
.pos-pnl{text-align:right}
.pnl-val{font-size:16px;font-weight:600;font-family:'JetBrains Mono',monospace}
.pnl-pct{font-size:11px;font-family:'JetBrains Mono',monospace;margin-top:1px}
.pos-prices{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-bottom:10px;background:var(--s2);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.price-item{padding:8px 10px;border-right:1px solid var(--border)}
.price-item:last-child{border-right:none}
.price-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.price-val{font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:500}
.price-val.sl{color:var(--danger)}
.dists{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.dist{font-size:10px;padding:3px 7px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-weight:500}
.dist.sl{background:#f43f5e0a;color:#f87171;border:1px solid #f43f5e20}
.dist.be{background:#f59e0b0a;color:#fbbf24;border:1px solid #f59e0b20}
.dist.tp1{background:#00e5b00a;color:#34d399;border:1px solid #00e5b020}
.bar-row{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.prog{height:4px;border-radius:2px;background:var(--border);overflow:hidden;margin-bottom:6px}
.prog-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.pos-strat{font-size:10px;color:var(--dim);font-weight:500}

/* ── Trade rows ── */
.trades-wrap{background:var(--s1);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.trade{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border)}
.trade:last-child{border-bottom:none}
.trade-l{display:flex;align-items:center;gap:8px}
.trade-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.trade-sym{font-size:12px;font-weight:500;font-family:'JetBrains Mono',monospace}
.trade-side{font-size:9px;font-weight:600;padding:2px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace}
.trade-side.l{color:var(--accent);background:#00e5b012}
.trade-side.s{color:var(--danger);background:#f43f5e12}
.trade-r{display:flex;align-items:center;gap:10px}
.trade-reason{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace}
.trade-pnl{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace}

/* ── Empty ── */
.empty{text-align:center;color:var(--dim);padding:28px;font-size:12px}

/* ── Unrealized PnL bar ── */
.unreal-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.unreal-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.unreal-val{font-size:18px;font-weight:600;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
    </div>
    <span class="brand">Crypto<span>Bot</span></span>
    <div class="conn-pill" id="conn-pill">
      <span class="live-dot" id="ldot"></span>
      <span id="conn-txt">Bağlanıyor</span>
    </div>
  </div>
  <div class="topbar-right">
    <span class="mode-tag" id="mode-tag">PAPER</span>
    <span class="clock" id="clk">--:--</span>
  </div>
</div>

<div class="wrap">
  <div class="statusbar" id="sbar">Bağlantı kuruluyor...</div>

  <div class="controls">
    <button class="btn btn-start" onclick="botAction('start')">▶ Başlat</button>
    <button class="btn btn-stop" onclick="botAction('stop')">■ Durdur</button>
  </div>

  <div class="stats">
    <div class="stat accent">
      <div class="stat-glow"></div>
      <div class="stat-label">Bakiye</div>
      <div class="stat-value g" id="s-bal">—</div>
      <div class="stat-sub" id="s-avail">—</div>
    </div>
    <div class="stat" id="pnl-stat">
      <div class="stat-label">Toplam PnL</div>
      <div class="stat-value" id="s-pnl">—</div>
      <div class="stat-sub" id="s-dpnl">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Kazanma</div>
      <div class="stat-value" id="s-wr">—</div>
      <div class="stat-sub" id="s-pf">—</div>
    </div>
    <div class="stat accent">
      <div class="stat-glow"></div>
      <div class="stat-label">Açık Pos.</div>
      <div class="stat-value g" id="s-pos">—</div>
      <div class="stat-sub" id="s-posub">—</div>
    </div>
  </div>

  <div class="unreal-card">
    <div>
      <div class="unreal-label">Gerçekleşmemiş PnL</div>
      <div class="unreal-val" id="s-unreal">—</div>
    </div>
    <div style="text-align:right">
      <div class="unreal-label">Art Arda Kayıp</div>
      <div class="unreal-val" id="s-consec" style="font-size:18px">—</div>
    </div>
  </div>

  <div class="sec"><span>Açık Pozisyonlar</span><span class="sec-line"></span><span id="pos-count" style="color:var(--accent);font-family:'JetBrains Mono',monospace">0</span></div>
  <div id="pos-list"><div class="empty">Bağlantı bekleniyor...</div></div>

  <div class="sec" style="margin-top:4px"><span>Son İşlemler</span><span class="sec-line"></span></div>
  <div class="trades-wrap"><div id="tr-list"><div class="empty">Bağlantı bekleniyor...</div></div></div>
</div>

<script>
const API = window.location.origin;
let es = null;

const fd = (n,d=2) => (+(n??0)).toFixed(d);
const fD = n => (n>=0?'+$':'-$')+Math.abs(+(n??0)).toFixed(2);
const fP = n => (n>=0?'+':'')+fd(n)+'%';
const fK = n => {
  const v = +(n??0);
  if(Math.abs(v)>=1000) return (v>=0?'+$':'-$')+(Math.abs(v)/1000).toFixed(1)+'K';
  return fD(v);
};

function setStatus(msg, type) {
  const el = document.getElementById('sbar');
  el.textContent = '● ' + msg;
  el.className = 'statusbar ' + (type||'');
}

function setConn(on) {
  const pill = document.getElementById('conn-pill');
  const dot = document.getElementById('ldot');
  const txt = document.getElementById('conn-txt');
  pill.className = 'conn-pill ' + (on?'live':'');
  dot.className = 'live-dot ' + (on?'on':'');
  txt.textContent = on ? 'Canlı' : 'Bağlantı yok';
}

function renderStats(s, bot) {
  if(!s) return;
  document.getElementById('s-bal').textContent = '$'+(+(s.totalBalance??0)).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById('s-avail').textContent = 'Serbest: $'+(+(s.availableBalance??0)).toFixed(0);
  const pnl = +(s.totalPnl??0);
  const pe = document.getElementById('s-pnl');
  pe.textContent = fD(pnl);
  pe.className = 'stat-value '+(pnl>=0?'g':'r');
  document.getElementById('s-dpnl').textContent = 'Bugün: '+fD(s.dailyPnl??0);
  document.getElementById('s-wr').textContent = '%'+fd(s.winRate??0,1);
  document.getElementById('s-pf').textContent = 'PF '+fd(s.profitFactor??0)+' · '+(s.totalTrades??0)+' işlem';
  const unreal = +(s.unrealizedPnl??0);
  const ue = document.getElementById('s-unreal');
  ue.textContent = fD(unreal);
  ue.style.color = unreal>=0?'var(--accent)':'var(--danger)';
  const cons = +(s.consecutiveLosses??0);
  const ce = document.getElementById('s-consec');
  ce.textContent = String(cons);
  ce.style.color = cons>=3?'var(--danger)':cons>=1?'var(--gold)':'var(--accent)';
  if(bot) {
    document.getElementById('mode-tag').textContent = (bot.mode||'paper').toUpperCase();
  }
}

function renderPositions(positions) {
  const el = document.getElementById('pos-list');
  const cnt = document.getElementById('pos-count');
  if(!positions||!positions.length){
    el.innerHTML='<div class="empty">Açık pozisyon yok</div>';
    cnt.textContent='0';
    document.getElementById('s-pos').textContent='0';
    document.getElementById('s-posub').textContent='—';
    return;
  }
  const longs=positions.filter(p=>p.side==='long').length;
  const shorts=positions.filter(p=>p.side==='short').length;
  cnt.textContent=String(positions.length);
  document.getElementById('s-pos').textContent=String(positions.length);
  document.getElementById('s-posub').textContent=longs+'L · '+shorts+'S';

  el.innerHTML=positions.map(p=>{
    const il=p.side==='long';
    const pnl=+(p.pnl??0);
    const pnlP=+(p.pnl_percent??0);
    const bars=+(p.candles_held??0);
    const maxB=+(p.max_bars??8);
    const bp=Math.min(100,(bars/Math.max(1,maxB))*100);
    const bc=bp>80?'var(--danger)':bp>60?'var(--gold)':'var(--accent)';
    const sym=(p.symbol||'').replace('USDT','');
    const dsl=p.distance_to_sl_pct;
    const dbe=p.distance_to_be_pct;
    const dt1=p.distance_to_tp1_pct;
    return`<div class="pos ${il?'long-pos':'short-pos'}">
      <div class="pos-top">
        <div>
          <div class="pos-sym">${sym}<span style="color:var(--dim);font-size:11px">/USDT</span></div>
          <div class="pos-tags">
            <span class="tag ${il?'long':'short'}">${(p.side||'').toUpperCase()} ${p.leverage??1}x</span>
            ${p.lot_type==='large'?'<span class="tag large">LARGE</span>':''}
            ${p.is_adopted?'<span class="tag sync">SYNC</span>':''}
          </div>
        </div>
        <div class="pos-pnl">
          <div class="pnl-val" style="color:${pnl>=0?'var(--accent)':'var(--danger)'}">${fD(pnl)}</div>
          <div class="pnl-pct" style="color:${pnl>=0?'var(--accent)':'var(--danger)'}">${fP(pnlP)}</div>
        </div>
      </div>
      <div class="pos-prices">
        <div class="price-item"><div class="price-label">Giriş</div><div class="price-val">$${(+(p.entry_price??0)).toLocaleString()}</div></div>
        <div class="price-item"><div class="price-label">Güncel</div><div class="price-val" style="color:${il?'var(--accent)':'var(--danger)'}">$${(+(p.current_price??0)).toLocaleString()}</div></div>
        <div class="price-item"><div class="price-label">Stop</div><div class="price-val sl">$${(+(p.stop_loss??0)).toLocaleString()}</div></div>
      </div>
      <div class="dists">
        ${dsl!=null?`<span class="dist sl">SL ${fd(Math.abs(dsl))}%</span>`:''}
        ${dbe!=null?`<span class="dist be">BE ${fd(Math.abs(dbe))}%</span>`:''}
        ${dt1!=null?`<span class="dist tp1">TP1 ${fd(Math.abs(dt1))}%</span>`:''}
      </div>
      <div class="bar-row"><span>Mum ${bars}/${maxB}</span><span>${Math.max(0,maxB-bars)} bar kaldı</span></div>
      <div class="prog"><div class="prog-fill" style="width:${bp}%;background:${bc}"></div></div>
      <div class="pos-strat">${p.strategy_name||''}</div>
    </div>`;
  }).join('');
}

function renderTrades(trades) {
  const el = document.getElementById('tr-list');
  if(!trades||!trades.length){el.innerHTML='<div class="empty">Henüz işlem yok</div>';return;}
  el.innerHTML=trades.slice(0,10).map(t=>{
    const pnl=+(t.pnl??0);
    const sym=(t.symbol||'').replace('USDT','');
    const il=t.side==='long';
    return`<div class="trade">
      <div class="trade-l">
        <div class="trade-dot" style="background:${pnl>=0?'var(--accent)':'var(--danger)'}"></div>
        <span class="trade-sym">${sym}</span>
        <span class="trade-side ${il?'l':'s'}">${(t.side||'').toUpperCase()}</span>
        <span class="trade-reason">${(t.exit_reason||'').replace(/_/g,' ')}</span>
      </div>
      <div class="trade-r">
        <span class="trade-pnl" style="color:${pnl>=0?'var(--accent)':'var(--danger)'}">${fD(pnl)}</span>
      </div>
    </div>`;
  }).join('');
}

function updateClock(){
  const now = new Date();
  document.getElementById('clk').textContent = now.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function connect() {
  if(es){es.close();es=null;}
  setStatus('Bağlanıyor...');
  setConn(false);
  es = new EventSource(API+'/api/stream');
  es.onopen = ()=>{setConn(true);setStatus('Railway SSE aktif','ok');};
  es.onmessage = e=>{
    try{
      const d=JSON.parse(e.data);
      renderStats(d.stats,d.botStatus);
      renderPositions(d.positions);
      renderTrades(d.recentTrades);
    }catch(err){setStatus('Veri hatası: '+err.message,'err');}
  };
  es.onerror = ()=>{
    setConn(false);
    setStatus('Bağlantı kesildi — yeniden deneniyor...','err');
    es.close();
    setTimeout(connect,5000);
  };
}

async function botAction(action) {
  try{
    await fetch(API+'/api/bot/'+action,{method:'POST'});
    setStatus('Bot '+(action==='start'?'başlatıldı ▶':'durduruldu ■'),'ok');
  }catch(e){setStatus('Hata: '+e.message,'err');}
}

setInterval(updateClock,1000);
updateClock();
connect();
</script>
</body>
</html>
